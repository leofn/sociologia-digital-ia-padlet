name: Padlet Mirror

on:
  schedule:
    - cron: '0 5 * * 5'  # Sexta-feira 02:00 BRT (UTC-3 = 05:00 UTC)
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Padlet Mirror
        run: python scripts/padlet_mirror.py

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git add -A && git commit -m "Auto: Padlet mirror $(date +%Y-%m-%d)" && git push)